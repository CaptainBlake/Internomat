name: Build And Publish Release Assets

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release-assets:
    runs-on: windows-latest
    env:
      LEETIFY_API: ${{ secrets.LEETIFY_API }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Verify pytest availability
        shell: pwsh
        run: |
          python -m pip show pytest
          python -c "import pytest; print(pytest.__version__)"

      - name: Validate tag format
        shell: pwsh
        run: |
          $tagRef = $env:GITHUB_REF
          if ($tagRef -notmatch '^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)$') {
            throw "Tag must match vX.Y.Z or vX.Y.Z-<prerelease>"
          }

      - name: Derive release metadata from tag
        id: meta
        shell: pwsh
        run: |
          $tagName = $env:GITHUB_REF_NAME
          $tagVersion = $tagName.TrimStart('v')
          $isPrerelease = if ($tagVersion -match '-') { 'true' } else { 'false' }

          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "tag_version=$tagVersion" >> $env:GITHUB_OUTPUT
          "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT

          Write-Host "Tag name: $tagName"
          Write-Host "Tag version: $tagVersion"
          Write-Host "Prerelease: $isPrerelease"

      - name: Report secret bootstrap mode
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LEETIFY_API)) {
            Write-Host "LEETIFY_API secret is not set; build will skip encrypted bootstrap bundle."
          }
          else {
            Write-Host "LEETIFY_API secret detected; build will embed encrypted bootstrap bundle."
          }

      - name: Build installer
        shell: pwsh
        run: |
          $tagVersion = "${{ steps.meta.outputs.tag_version }}"
          python src/build.py --installer --version $tagVersion

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $tagVersion = "${{ steps.meta.outputs.tag_version }}"
          $installer = "dist/Internomat-Setup-$tagVersion.exe"
          if (!(Test-Path $installer)) {
            throw "Installer not found: $installer"
          }
          $hash = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLower()
          $line = "$hash  Internomat-Setup-$tagVersion.exe"
          Set-Content -Path "dist/SHA256SUMS.txt" -Value $line -NoNewline

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            dist/Internomat-Setup-${{ steps.meta.outputs.tag_version }}.exe
            dist/SHA256SUMS.txt
