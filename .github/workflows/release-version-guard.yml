name: Release Version Guard

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  validate-tag-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate tag format
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Tag version: ${TAG_VERSION}"

          if [[ ! "${TAG_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match semantic version (vX.Y.Z)"
            exit 1
          fi

      - name: Summary
        run: echo "Tag format is valid."
