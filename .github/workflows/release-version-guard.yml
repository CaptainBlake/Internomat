name: Release Version Guard

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate-tag-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate tag format
        shell: bash
        run: |
          TAG_REF="${GITHUB_REF}"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Tag ref: ${TAG_REF}"
          echo "Tag version: ${TAG_VERSION}"

          if [[ ! "${TAG_REF}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must match semantic version (vX.Y.Z or vX.Y.Z-<prerelease>)"
            exit 1
          fi

      - name: Summary
        run: echo "Tag format is valid."
