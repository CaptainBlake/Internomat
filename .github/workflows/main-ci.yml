name: Main CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "requirements.txt"
              - "pyproject.toml"
              - "installer/**"
              - ".github/workflows/**"

  tests:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests (excluding live)
        run: |
          pytest -m "not live"

  build:
    name: Build App (Main)
    runs-on: windows-latest
    needs:
      - changes
      - tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.code == 'true' && needs.tests.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app bundle
        shell: pwsh
        run: |
          python src/build.py --version 0.0.${{ github.run_number }}
